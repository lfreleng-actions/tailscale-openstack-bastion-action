---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: Test OAuth with Ephemeral Keys

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main, master]
  # Fork PRs cannot access OpenStack/Tailscale secrets, so this suite is
  # shown but skipped on them by default. A maintainer can opt a fork PR
  # in by applying the 'safe to test' label: the entry job then runs via
  # the 'integration' environment (required reviewers), with the checkout
  # pinned to the PR head SHA. The workflow definition is always taken
  # from the base branch; untrusted PR code only executes after approval.
  pull_request_target:  # zizmor: ignore[dangerous-triggers]
    branches: [main, master]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      bastion_flavor:
        description: "OpenStack instance flavor for bastion"
        required: false
        type: string
        default: "v3-standard-2"
      bastion_image:
        description: "Base image for bastion host"
        required: false
        type: string
        default: "Ubuntu 22.04.5 LTS (x86_64) [2025-03-27]"
      bastion_network:
        description: "Network for bastion host"
        required: false
        type: string
        default: "odlci"
      debug_mode:
        description: "Enable debug logging"
        required: false
        type: boolean
        default: true

concurrency:
  # Use a per-PR key for pull_request_target runs (github.ref is the base
  # branch ref under that event, so it would otherwise collide across PRs);
  # fall back to github.ref for push and workflow_dispatch.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BASTION_NAME: "test-oauth-ephemeral-${{ github.run_id }}"
  BASTION_WAIT_TIMEOUT: 300

permissions:
  contents: read

jobs:
  prepare:
    name: Setup Bastion with OAuth Ephemeral Keys
    # Runs on push, workflow_dispatch, and same-repo PRs automatically.
    # Fork PRs run only when a maintainer adds the 'safe to test' label
    # (otherwise the job is shown but skipped). This entry job is the
    # approval gate; downstream jobs cannot start until it succeeds.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       (github.event.pull_request.head.repo.full_name == github.repository ||
        contains(github.event.pull_request.labels.*.name, 'safe to test')))
    # Gate fork-PR runs behind the 'integration' environment (required
    # reviewers). Trusted events (push, dispatch, same-repo PRs) use the
    # unprotected 'integration-auto' environment, which has no reviewers
    # and runs without delay.
    # yamllint disable-line rule:line-length
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'integration' || 'integration-auto' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      bastion_ip: ${{ steps.setup.outputs.bastion_ip }}
      bastion_name: ${{ steps.setup.outputs.bastion_name }}
      status: ${{ steps.setup.outputs.status }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For fork PRs this is the (reviewer-approved) PR head; for push
          # and same-repo events it falls back to the triggering SHA.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Tailscale on Runner
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          hostname: test-oauth-ephemeral-runner-${{ github.run_id }}
          args: --ssh --accept-dns=false

      - name: Verify Runner Tailscale Connection
        run: |
          echo "=== Runner Tailscale Status ==="
          sudo tailscale status
          echo ""
          echo "Runner IPv4: $(sudo tailscale ip -4)"
          echo "Runner IPv6: $(sudo tailscale ip -6)"

      - name: Setup bastion with OAuth ephemeral keys
        id: setup
        uses: ./
        with:
          operation: setup
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}
          openstack_network_id: ${{ secrets.OPENSTACK_NETWORK_ID }}
          bastion_flavor: ${{ inputs.bastion_flavor || 'v3-standard-2' }}
          bastion_image: ${{ inputs.bastion_image || 'Ubuntu 22.04.5 LTS (x86_64) [2025-03-27]' }}
          bastion_network: ${{ inputs.bastion_network || 'odlci' }}
          bastion_name: ${{ env.BASTION_NAME }}
          bastion_wait_timeout: ${{ env.BASTION_WAIT_TIMEOUT }}
          tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tailscale_use_ephemeral_keys: "true"
          tailscale_tags: "tag:bastion"
          debug_mode: ${{ inputs.debug_mode || 'true' }}

      - name: Verify Bastion Output
        run: |
          echo "=== Bastion Information ==="
          echo "Bastion Name: ${STEPS_SETUP_OUTPUTS_BASTION_NAME}"
          echo "Bastion IP: ${STEPS_SETUP_OUTPUTS_BASTION_IP}"
          echo "Status: ${STEPS_SETUP_OUTPUTS_STATUS}"
          echo "======================"

          if [ -z "${STEPS_SETUP_OUTPUTS_BASTION_IP}" ]; then
            echo "❌ ERROR: Bastion IP is empty"
            exit 1
          fi

          if [ -z "${STEPS_SETUP_OUTPUTS_BASTION_NAME}" ]; then
            echo "❌ ERROR: Bastion name is empty"
            exit 1
          fi

          echo "✅ Bastion outputs are valid"
        env:
          STEPS_SETUP_OUTPUTS_BASTION_NAME: ${{ steps.setup.outputs.bastion_name }}
          STEPS_SETUP_OUTPUTS_BASTION_IP: ${{ steps.setup.outputs.bastion_ip }}
          STEPS_SETUP_OUTPUTS_STATUS: ${{ steps.setup.outputs.status }}

  test-connectivity:
    name: Test Bastion Connectivity
    needs: prepare
    runs-on: ubuntu-24.04
    # Secrets are consumed here; declare a dedicated environment. The fork
    # approval gate stays on the entry job (via needs), so this uses the
    # unprotected 'integration-auto' to avoid a redundant second approval.
    environment: integration-auto
    timeout-minutes: 15

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Tailscale on Runner
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          hostname: test-oauth-connectivity-${{ github.run_id }}
          args: --ssh --accept-dns=false

      - name: Wait for Bastion in Tailscale Network
        run: |
          echo "Waiting for bastion to appear in Tailscale network..."
          TIMEOUT=60
          ELAPSED=0
          INTERVAL=5

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if sudo tailscale status | grep -qF -- "${NEEDS_PREPARE_OUTPUTS_BASTION_NAME}"; then
              echo "✅ Bastion found in Tailscale network"
              sudo tailscale status | grep -F -- "${NEEDS_PREPARE_OUTPUTS_BASTION_NAME}"
              exit 0
            fi
            echo "Waiting... ($ELAPSED/$TIMEOUT seconds)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Timeout: Bastion not found in Tailscale network"
          sudo tailscale status
          exit 1
        env:
          NEEDS_PREPARE_OUTPUTS_BASTION_NAME: ${{ needs.prepare.outputs.bastion_name }}

      - name: Test SSH Connectivity
        run: |
          echo "Testing SSH connectivity to bastion..."
          BASTION_IP="${NEEDS_PREPARE_OUTPUTS_BASTION_IP}"

          if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                 root@"${BASTION_IP}" "echo 'SSH connection successful'" 2>/dev/null; then
            echo "✅ SSH connection successful"
          else
            echo "❌ SSH connection failed"
            exit 1
          fi
        env:
          NEEDS_PREPARE_OUTPUTS_BASTION_IP: ${{ needs.prepare.outputs.bastion_ip }}

      - name: Test Bastion Commands
        run: |
          BASTION_IP="${NEEDS_PREPARE_OUTPUTS_BASTION_IP}"

          echo "=== Running diagnostic commands on bastion ==="

          echo "1. System info:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "uname -a"

          echo "2. Tailscale status:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "tailscale status"

          echo "3. Network interfaces:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "ip addr show | grep -E 'inet|tailscale'"

          echo "4. Check bastion ready marker:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "cat /tmp/bastion-ready"

          echo "✅ All diagnostic commands executed successfully"
        env:
          NEEDS_PREPARE_OUTPUTS_BASTION_IP: ${{ needs.prepare.outputs.bastion_ip }}

      - name: Test Network Connectivity from Bastion
        run: |
          BASTION_IP="${NEEDS_PREPARE_OUTPUTS_BASTION_IP}"

          echo "Testing network connectivity from bastion..."

          # Test DNS resolution
          echo "1. DNS resolution:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "nslookup google.com"

          # Test external connectivity
          echo "2. External connectivity:"
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "curl -s https://ifconfig.me"

          # Test Tailscale connectivity
          echo "3. Tailscale peer connectivity:"
          RUNNER_IP=$(sudo tailscale ip -4)
          ssh -o StrictHostKeyChecking=no root@"${BASTION_IP}" "ping -c 3 ${RUNNER_IP}"

          echo "✅ Network connectivity tests passed"
        env:
          NEEDS_PREPARE_OUTPUTS_BASTION_IP: ${{ needs.prepare.outputs.bastion_ip }}

  teardown:
    name: Teardown Bastion
    needs: [prepare, test-connectivity]
    runs-on: ubuntu-24.04
    # Secrets are consumed here; declare a dedicated environment. The fork
    # approval gate stays on the entry job (via needs), so this uses the
    # unprotected 'integration-auto' to avoid a redundant second approval.
    environment: integration-auto
    # Transitively gated: needs the (approved) entry job. The event guard
    # mirrors the entry job so unlabelled fork PRs skip teardown too.
    if: >-
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request_target' &&
        (github.event.pull_request.head.repo.full_name == github.repository ||
         contains(github.event.pull_request.labels.*.name, 'safe to test'))))
    timeout-minutes: 10

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Tailscale on Runner
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          hostname: test-oauth-teardown-${{ github.run_id }}
          args: --ssh --accept-dns=false

      - name: Teardown bastion
        uses: ./
        with:
          operation: teardown
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}
          bastion_name: ${{ needs.prepare.outputs.bastion_name }}
          debug_mode: ${{ inputs.debug_mode || 'true' }}

      - name: Verify Bastion Cleanup
        env:
          OS_AUTH_URL: ${{ secrets.OPENSTACK_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OPENSTACK_PROJECT_ID }}
          OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
          OPENSTACK_PASSWORD_B64: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          OS_REGION_NAME: ${{ secrets.OPENSTACK_REGION }}
          BASTION_NAME_CHECK: ${{ needs.prepare.outputs.bastion_name }}
        run: |
          echo "Verifying bastion cleanup..."

          # Setup OpenStack CLI
          python -m pip install --upgrade pip
          pip install python-openstackclient

          # Configure OpenStack credentials
          export OS_PASSWORD
          OS_PASSWORD=$(printf '%s' "${OPENSTACK_PASSWORD_B64}" | base64 -d)
          export OS_IDENTITY_API_VERSION="3"
          export OS_USER_DOMAIN_NAME="Default"
          export OS_PROJECT_DOMAIN_NAME="Default"

          # Check if bastion instance still exists
          if openstack server show "${BASTION_NAME_CHECK}" &>/dev/null; then
            echo "❌ ERROR: Bastion instance still exists after teardown"
            openstack server show "${BASTION_NAME_CHECK}"
            exit 1
          else
            echo "✅ Bastion instance successfully deleted"
          fi

      - name: Verify Tailscale Cleanup
        env:
          BASTION_NAME_CHECK: ${{ needs.prepare.outputs.bastion_name }}
        run: |
          echo "Verifying Tailscale cleanup..."

          # Wait a bit for Tailscale network to update
          sleep 10

          # Check if bastion is still in Tailscale network
          if sudo tailscale status | grep -qF -- "${BASTION_NAME_CHECK}"; then
            echo "⚠️ WARNING: Bastion still appears in Tailscale network (may take time to update)"
            sudo tailscale status | grep -F -- "${BASTION_NAME_CHECK}"
          else
            echo "✅ Bastion removed from Tailscale network"
          fi

  summary:
    name: Test Summary
    needs: [prepare, test-connectivity, teardown]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Always run (to summarise results) but only for trusted events and
    # labeled fork PRs; unlabeled fork PRs skip the whole workflow.
    if: >-
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request_target' &&
        (github.event.pull_request.head.repo.full_name == github.repository ||
         contains(github.event.pull_request.labels.*.name, 'safe to test'))))

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate Test Summary
        env:
          WORKFLOW_NAME: "${{ github.workflow }}"
          RUN_ID: "${{ github.run_id }}"
          EVENT_NAME: "${{ github.event_name }}"
          REF_NAME: "${{ github.ref_name }}"
          PREPARE_RESULT: "${{ needs.prepare.result }}"
          CONNECTIVITY_RESULT: "${{ needs.test-connectivity.result }}"
          TEARDOWN_RESULT: "${{ needs.teardown.result }}"
        run: |
          {
            echo "## OAuth Ephemeral Key Test Summary"
            echo ""
            echo "- **Workflow:** $WORKFLOW_NAME"
            echo "- **Run ID:** $RUN_ID"
            echo "- **Trigger:** $EVENT_NAME"
            echo "- **Branch:** $REF_NAME"
            echo ""
            echo "### Test Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Setup test result
          if [ "$PREPARE_RESULT" == "success" ]; then
            echo "- ✅ **Bastion Setup (OAuth → Ephemeral):** Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ **Bastion Setup (OAuth → Ephemeral):** Failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Connectivity test result
          if [ "$CONNECTIVITY_RESULT" == "success" ]; then
            echo "- ✅ **Connectivity Tests:** Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ **Connectivity Tests:** Failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Teardown test result
          if [ "$TEARDOWN_RESULT" == "success" ]; then
            echo "- ✅ **Bastion Teardown:** Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ **Bastion Teardown:** Failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Overall status
          if [ "$PREPARE_RESULT" == "success" ] && \
             [ "$CONNECTIVITY_RESULT" == "success" ] && \
             [ "$TEARDOWN_RESULT" == "success" ]; then
            echo "### ✅ All Tests Passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Some Tests Failed" >> "$GITHUB_STEP_SUMMARY"
          fi
